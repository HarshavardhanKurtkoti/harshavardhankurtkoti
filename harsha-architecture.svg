<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 540" width="420" height="540" role="img" aria-label="Helios AI runtime architecture: User to API to Planner to Scheduler to Workers to Memory to Knowledge to LLM">
<title>Helios AI Runtime — Architecture Overview</title>
<defs>
<style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.node{opacity:0;animation:fadeUp .6s ease forwards}
.arrow{stroke:#38bdf8;stroke-width:1.5;fill:none;opacity:.55}
]]></style>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#0b1120"/>
  <stop offset="100%" stop-color="#020617"/>
</linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#38bdf8"/>
  <stop offset="100%" stop-color="#6366f1"/>
</linearGradient>
</defs>
<rect x="1" y="1" width="418" height="538" rx="16" fill="url(#bg)" stroke="url(#accent)" stroke-width="1.2"/>
<text x="210" y="34" text-anchor="middle" font-size="14" font-weight="bold" fill="#38bdf8">Helios AI Runtime</text>
<text x="210" y="52" text-anchor="middle" font-size="10.5" fill="#64748b">Event-driven agent execution flow</text>

<g class="node" style="animation-delay:.1s">
  <rect x="130" y="68" width="160" height="36" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="210" y="91" text-anchor="middle" font-size="12" fill="#e2e8f0">User / Client</text>
</g>
<line class="arrow" x1="210" y1="104" x2="210" y2="118"/>
<polygon fill="#38bdf8" opacity=".55" points="210,118 206,110 214,110"/>

<g class="node" style="animation-delay:.2s">
  <rect x="130" y="120" width="160" height="36" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="210" y="143" text-anchor="middle" font-size="12" fill="#e2e8f0">API Gateway</text>
</g>
<line class="arrow" x1="210" y1="156" x2="210" y2="170"/>
<polygon fill="#38bdf8" opacity=".55" points="210,170 206,162 214,162"/>

<g class="node" style="animation-delay:.3s">
  <rect x="130" y="172" width="160" height="36" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="210" y="195" text-anchor="middle" font-size="12" fill="#e2e8f0">Task Planner</text>
</g>
<line class="arrow" x1="210" y1="208" x2="210" y2="222"/>
<polygon fill="#38bdf8" opacity=".55" points="210,222 206,214 214,214"/>

<g class="node" style="animation-delay:.4s">
  <rect x="105" y="224" width="210" height="36" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="210" y="247" text-anchor="middle" font-size="12" fill="#e2e8f0">Runtime Scheduler</text>
</g>
<line class="arrow" x1="210" y1="260" x2="210" y2="274"/>
<polygon fill="#38bdf8" opacity=".55" points="210,274 206,266 214,266"/>

<g class="node" style="animation-delay:.5s">
  <rect x="115" y="276" width="190" height="36" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="210" y="299" text-anchor="middle" font-size="12" fill="#e2e8f0">Async Worker Pool</text>
</g>
<line class="arrow" x1="210" y1="312" x2="210" y2="326"/>
<polygon fill="#38bdf8" opacity=".55" points="210,326 206,318 214,318"/>

<g class="node" style="animation-delay:.6s">
  <rect x="120" y="328" width="180" height="36" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="210" y="351" text-anchor="middle" font-size="12" fill="#e2e8f0">Memory Engine</text>
</g>
<line class="arrow" x1="210" y1="364" x2="210" y2="378"/>
<polygon fill="#38bdf8" opacity=".55" points="210,378 206,370 214,370"/>

<g class="node" style="animation-delay:.7s">
  <rect x="120" y="380" width="180" height="36" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="210" y="403" text-anchor="middle" font-size="12" fill="#e2e8f0">Knowledge Store</text>
</g>
<line class="arrow" x1="210" y1="416" x2="210" y2="430"/>
<polygon fill="#38bdf8" opacity=".55" points="210,430 206,422 214,422"/>

<g class="node" style="animation-delay:.8s">
  <rect x="125" y="432" width="170" height="36" rx="10" fill="#0c1a35" stroke="#6366f1" stroke-width="1.2"/>
  <text x="210" y="455" text-anchor="middle" font-size="12" fill="#a5b4fc">LLM Providers</text>
</g>
</svg>
