<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 310" width="420" height="310" role="img" aria-label="Top languages">
<defs><style><![CDATA[
text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shineX{0%{transform:translateX(-140px)}60%,100%{transform:translateX(460px)}}
.row{opacity:0;animation:fadeUp .5s ease forwards}
.sh{animation:shineX 4s ease-in-out 2.2s infinite}
]]></style>
<linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#38bdf8;#818cf8;#38bdf8" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#818cf8;#38bdf8;#818cf8" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="shg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".08"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/></linearGradient>
<clipPath id="cardc"><rect x="1" y="1" width="418" height="308" rx="14"/></clipPath>
<clipPath id="stackc"><rect x="20" y="58" width="0" height="11" rx="5.5"><animate attributeName="width" from="0" to="380" dur="1.4s" begin=".4s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/></rect></clipPath>
</defs>
<rect x="1" y="1" width="418" height="308" rx="14" fill="#0b1120" stroke="url(#tg)" stroke-width="1.5"/>
<text x="20" y="34" font-size="16" font-weight="bold" fill="url(#tg)">📊 Top Languages</text>
<g clip-path="url(#stackc)">
  <rect x="20.0"  y="58" width="121.2" height="11" fill="#da5b0b"/>
  <rect x="141.2" y="58" width="103.0" height="11" fill="#ff7a59"/>
  <rect x="244.2" y="58" width="78.3" height="11" fill="#3178c6"/>
  <rect x="322.5" y="58" width="72.6" height="11" fill="#777bb4"/>
</g>

  <g class="row" style="animation-delay:0.90s">
    <circle cx="26" cy="91" r="5" fill="#da5b0b"/>
    <text x="40" y="96" font-size="13" fill="#e2e8f0" font-weight="bold">Jupyter Notebook</text>
    <text x="396" y="96" text-anchor="end" font-size="13" fill="#da5b0b" font-weight="bold">31.9%</text>
    <rect x="40" y="104" width="268" height="9" rx="4.5" fill="#1e293b"/>
    <rect class="bar" x="40" y="104" width="0" height="9" rx="4.5" fill="#da5b0b" style="animation-delay:1.05s">
      <animate attributeName="width" from="0" to="85.5" dur="1.1s" begin="1.05s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.25s">
    <circle cx="26" cy="133" r="5" fill="#ff7a59"/>
    <text x="40" y="138" font-size="13" fill="#e2e8f0" font-weight="bold">Python</text>
    <text x="396" y="138" text-anchor="end" font-size="13" fill="#ff7a59" font-weight="bold">27.1%</text>
    <rect x="40" y="146" width="268" height="9" rx="4.5" fill="#1e293b"/>
    <rect class="bar" x="40" y="146" width="0" height="9" rx="4.5" fill="#ff7a59" style="animation-delay:1.40s">
      <animate attributeName="width" from="0" to="72.6" dur="1.1s" begin="1.40s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.60s">
    <circle cx="26" cy="175" r="5" fill="#3178c6"/>
    <text x="40" y="180" font-size="13" fill="#e2e8f0" font-weight="bold">TypeScript</text>
    <text x="396" y="180" text-anchor="end" font-size="13" fill="#3178c6" font-weight="bold">20.6%</text>
    <rect x="40" y="188" width="268" height="9" rx="4.5" fill="#1e293b"/>
    <rect class="bar" x="40" y="188" width="0" height="9" rx="4.5" fill="#3178c6" style="animation-delay:1.75s">
      <animate attributeName="width" from="0" to="55.2" dur="1.1s" begin="1.75s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:1.95s">
    <circle cx="26" cy="217" r="5" fill="#777bb4"/>
    <text x="40" y="222" font-size="13" fill="#e2e8f0" font-weight="bold">PHP</text>
    <text x="396" y="222" text-anchor="end" font-size="13" fill="#777bb4" font-weight="bold">19.1%</text>
    <rect x="40" y="230" width="268" height="9" rx="4.5" fill="#1e293b"/>
    <rect class="bar" x="40" y="230" width="0" height="9" rx="4.5" fill="#777bb4" style="animation-delay:2.10s">
      <animate attributeName="width" from="0" to="51.2" dur="1.1s" begin="2.10s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
  <g class="row" style="animation-delay:2.30s">
    <circle cx="26" cy="259" r="5" fill="#f7df1e"/>
    <text x="40" y="264" font-size="13" fill="#e2e8f0" font-weight="bold">JavaScript</text>
    <text x="396" y="264" text-anchor="end" font-size="13" fill="#f7df1e" font-weight="bold">0.4%</text>
    <rect x="40" y="272" width="268" height="9" rx="4.5" fill="#1e293b"/>
    <rect class="bar" x="40" y="272" width="0" height="9" rx="4.5" fill="#f7df1e" style="animation-delay:2.45s">
      <animate attributeName="width" from="0" to="1.1" dur="1.1s" begin="2.45s" fill="freeze" calcMode="spline" keySplines=".2 .8 .3 1"/>
    </rect>
  </g>
<g clip-path="url(#cardc)"><rect class="sh" x="0" y="0" width="100" height="310" fill="url(#shg)" transform="skewX(-15)"/></g>
</svg>
